<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Gym Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-panel">
            <p class="eyebrow">Start tracking today</p>
            <h1>Create account</h1>
            <p class="muted">Your workouts are saved locally in JSON storage.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="messages">
                        {% for category, message in messages %}
                            <p class="message {{ category }}">{{ message }}</p>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('signup') }}" class="form">
                <label for="name">Name</label>
                <input id="name" name="name" type="text" autocomplete="name" required>

                <label for="username">Username</label>
                <input id="username" name="username" type="text" autocomplete="username" required>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="new-password" minlength="6" required>

                <label for="confirm_password">Confirm password</label>
                <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" minlength="6" required>

                <button type="submit">Sign up</button>
            </form>

            <p class="switch-link">Already tracking? <a href="{{ url_for('login') }}">Log in</a></p>
        </section>
    </main>
</body>
</html>
